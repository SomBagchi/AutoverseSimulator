name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.16"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies (dev + default deps, no torch)
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Type-check with mypy
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest -q
